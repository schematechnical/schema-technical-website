<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Schema Technical Pipeline Rolodex</title>
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=JetBrains+Mono:wght@400;500;600&display=swap');

  :root {
    --bg-primary: #0C0F14;
    --bg-secondary: #141820;
    --bg-card: #1A1F2B;
    --bg-card-hover: #1F2535;
    --bg-input: #141820;
    --border: #2A3040;
    --border-light: #353D50;
    --text-primary: #E8ECF2;
    --text-secondary: #8A93A6;
    --text-muted: #5A6376;
    --accent: #3B82F6;
    --accent-dim: #2563EB;
    --accent-glow: rgba(59, 130, 246, 0.15);
    --identified: #6B7280;
    --contacted: #F59E0B;
    --engaged: #3B82F6;
    --qualified: #8B5CF6;
    --proposal: #EC4899;
    --closed: #10B981;
    --dead: #EF4444;
    --hold: #F59E0B;
    --priority-high: #EF4444;
    --priority-medium: #F59E0B;
    --priority-low: #6B7280;
    --danger: #EF4444;
    --radius: 6px;
    --radius-lg: 10px;
    --shadow: 0 2px 8px rgba(0,0,0,0.3);
    --font-sans: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font-sans);
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .header {
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .logo {
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--text-secondary);
    text-transform: uppercase;
  }
  .logo span { color: var(--accent); }
  .header-title {
    font-size: 18px;
    font-weight: 600;
    color: var(--text-primary);
  }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .header-stat {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-muted);
    padding: 4px 10px;
    background: var(--bg-primary);
    border-radius: var(--radius);
    border: 1px solid var(--border);
  }
  .header-stat strong { color: var(--text-secondary); }

  .tab-bar {
    display: flex;
    gap: 0;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
  }
  .tab {
    padding: 12px 20px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    user-select: none;
  }
  .tab:hover { color: var(--text-secondary); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .toolbar {
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .search-box {
    flex: 1;
    min-width: 200px;
    max-width: 360px;
    position: relative;
  }
  .search-box input {
    width: 100%;
    padding: 8px 12px 8px 36px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-primary);
    font-family: var(--font-sans);
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-box input:focus { border-color: var(--accent); }
  .search-box input::placeholder { color: var(--text-muted); }
  .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 14px;
  }

  .filter-btn {
    padding: 8px 14px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-secondary);
    font-family: var(--font-sans);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }
  .filter-btn:hover { border-color: var(--border-light); color: var(--text-primary); }
  .filter-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }

  .divider { width: 1px; height: 24px; background: var(--border); margin: 0 4px; }

  .btn-primary {
    padding: 8px 16px;
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    color: #fff;
    font-family: var(--font-sans);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    margin-left: auto;
  }
  .btn-primary:hover { background: var(--accent-dim); }

  .pipeline-view {
    padding: 16px 24px;
    overflow-x: auto;
  }
  .pipeline-columns {
    display: flex;
    gap: 12px;
    min-width: 1080px;
  }
  .pipeline-col {
    flex: 1;
    min-width: 170px;
    border-radius: var(--radius);
    transition: all 0.2s ease;
    display: flex;
    flex-direction: column;
  }
  .pipeline-col.collapsed {
    flex: 0;
    min-width: 44px;
  }
  .pipeline-col.drag-over {
    background: rgba(59, 130, 246, 0.05);
    border: 1px dashed var(--accent);
  }
  
  .pipeline-col-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    margin-bottom: 8px;
    border-radius: var(--radius);
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
  }
  .pipeline-col-header:hover {
    background: var(--bg-card-hover);
    border-color: var(--border-light);
  }
  .pipeline-col-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .pipeline-col-label {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-secondary);
  }
  .pipeline-col-count {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-muted);
    margin-left: auto;
  }

  .pipeline-col.collapsed .pipeline-col-header {
    flex-direction: column;
    padding: 16px 8px;
    height: 100%;
    margin-bottom: 0;
  }
  .pipeline-col.collapsed .pipeline-col-label {
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    margin: 12px 0;
  }
  .pipeline-col.collapsed .pipeline-col-count {
    margin-left: 0;
    margin-top: auto;
  }

  .pipeline-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    margin-bottom: 8px;
    cursor: grab;
    transition: all 0.15s;
    border-left: 3px solid transparent;
  }
  .pipeline-card:active { cursor: grabbing; }
  .pipeline-card:hover { background: var(--bg-card-hover); border-color: var(--border-light); }
  .pipeline-card.priority-high { border-left-color: var(--priority-high); }
  .pipeline-card.priority-medium { border-left-color: var(--priority-medium); }
  .pipeline-card.priority-low { border-left-color: var(--priority-low); }

  .pipeline-card-company {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 4px;
  }
  .pipeline-card-contact {
    font-size: 11px;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }
  .pipeline-card-service {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--accent);
    background: var(--accent-glow);
    padding: 2px 6px;
    border-radius: 3px;
    display: inline-block;
    margin-right: 4px;
    margin-bottom: 4px;
  }
  .pipeline-card-date {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 6px;
  }
  .pipeline-card-velocity {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 6px;
    padding-top: 6px;
    border-top: 1px solid var(--border);
  }

  .tag-overdue {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--danger);
    background: rgba(239,68,68,0.15);
    padding: 2px 6px;
    border-radius: 3px;
    margin-left: 6px;
    font-weight: 600;
    vertical-align: middle;
  }

  .rolodex-view { padding: 16px 24px; }
  .rolodex-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 12px;
  }

  .contact-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .contact-card:hover { background: var(--bg-card-hover); transform: translateY(-1px); box-shadow: var(--shadow); }
  .contact-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .contact-card-company {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-primary);
  }
  .contact-card-status {
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .status-identified { background: rgba(107,114,128,0.2); color: #9CA3AF; }
  .status-contacted { background: rgba(245,158,11,0.15); color: #FBBF24; }
  .status-engaged { background: rgba(59,130,246,0.15); color: #60A5FA; }
  .status-qualified { background: rgba(139,92,246,0.15); color: #A78BFA; }
  .status-proposal { background: rgba(236,72,153,0.15); color: #F472B6; }
  .status-closed { background: rgba(16,185,129,0.15); color: #34D399; }
  .status-dead { background: rgba(239,68,68,0.15); color: #F87171; }
  .status-hold { background: rgba(245,158,11,0.15); color: #FBBF24; }

  .contact-card-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    margin-bottom: 2px;
  }
  .contact-card-role {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 12px;
  }
  .contact-card-details {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 4px 12px;
    font-size: 11px;
  }
  .contact-card-label {
    color: var(--text-muted);
    font-weight: 500;
    text-transform: uppercase;
    font-size: 10px;
    letter-spacing: 0.05em;
  }
  .contact-card-value { color: var(--text-secondary); }
  .contact-card-services { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 4px; }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200;
    justify-content: center;
    align-items: flex-start;
    padding: 40px 16px;
    overflow-y: auto;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    width: 100%;
    max-width: 560px;
    padding: 24px;
    position: relative;
    animation: modalIn 0.15s ease-out;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .modal-title {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 20px;
    color: var(--text-primary);
  }
  .modal-close {
    position: absolute;
    top: 16px;
    right: 16px;
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 20px;
    cursor: pointer;
    line-height: 1;
    padding: 4px;
  }
  .modal-close:hover { color: var(--text-primary); }

  .form-group { margin-bottom: 14px; }
  .form-label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    margin-bottom: 5px;
  }
  .form-input, .form-select, .form-textarea {
    width: 100%;
    padding: 8px 12px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-primary);
    font-family: var(--font-sans);
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); }
  .form-select { appearance: none; cursor: pointer; }
  .form-textarea { resize: vertical; min-height: 60px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .form-actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }
  .btn-danger {
    padding: 8px 14px;
    background: transparent;
    border: 1px solid var(--danger);
    border-radius: var(--radius);
    color: var(--danger);
    font-family: var(--font-sans);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
  }
  .btn-danger:hover { background: rgba(239,68,68,0.1); }
  .btn-secondary {
    padding: 8px 14px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-secondary);
    font-family: var(--font-sans);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
  }
  .btn-secondary:hover { border-color: var(--border-light); }

  .export-bar {
    padding: 12px 24px;
    background: var(--bg-secondary);
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 90;
    flex-wrap: wrap;
    gap: 12px;
  }
  .export-info {
    font-size: 11px;
    color: var(--text-muted);
    font-family: var(--font-mono);
  }
  .export-actions { display: flex; gap: 8px; flex-wrap: wrap; }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty-state-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.3; }
  .empty-state-text { font-size: 14px; margin-bottom: 4px; }
  .empty-state-sub { font-size: 12px; }

  @media (max-width: 640px) {
    .header { padding: 12px 16px; flex-wrap: wrap; gap: 8px; }
    .header-title { font-size: 15px; }
    .tab-bar { padding: 0 16px; }
    .tab { padding: 10px 14px; font-size: 12px; }
    .toolbar { padding: 12px 16px; }
    .pipeline-view { padding: 12px 16px; }
    .rolodex-view { padding: 12px 16px; }
    .rolodex-grid { grid-template-columns: 1fr; }
    .modal { padding: 20px 16px; }
    .form-row { grid-template-columns: 1fr; }
    .export-bar { padding: 10px 16px; }
    .header-stat { display: none; }
  }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--border-light); }

  body { padding-bottom: 80px; }

  .analytics-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .analytics-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px;
    text-align: center;
  }
  .analytics-card-label {
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    margin-bottom: 8px;
  }
  .analytics-card-value {
    font-family: var(--font-mono);
    font-size: 28px;
    font-weight: 700;
    color: var(--text-primary);
  }
  .analytics-card-unit {
    font-size: 12px;
    color: var(--text-muted);
    margin-left: 2px;
  }
  .analytics-card-sub {
    font-size: 11px;
    color: var(--text-secondary);
    margin-top: 4px;
  }
  .analytics-bar-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }
  .analytics-bar-label {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-secondary);
    min-width: 110px;
    text-align: right;
    flex-shrink: 0;
  }
  .analytics-bar-track {
    flex: 1;
    height: 24px;
    background: var(--bg-input);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    overflow: hidden;
    position: relative;
  }
  .analytics-bar-fill {
    height: 100%;
    border-radius: var(--radius);
    transition: width 0.3s;
    display: flex;
    align-items: center;
    padding-left: 8px;
  }
  .analytics-bar-value {
    font-family: var(--font-mono);
    font-size: 11px;
    color: #fff;
    font-weight: 600;
    white-space: nowrap;
  }
  .analytics-section-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .analytics-section { margin-bottom: 32px; }
  .analytics-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  .analytics-table th {
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    text-align: left;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
  }
  .analytics-table td {
    padding: 8px 12px;
    color: var(--text-secondary);
    border-bottom: 1px solid var(--border);
  }
  .analytics-table tr:hover td { background: var(--bg-card-hover); }

  .btn-outreach {
    padding: 8px 14px;
    background: transparent;
    border: 1px solid var(--accent);
    border-radius: var(--radius);
    color: var(--accent);
    font-family: var(--font-sans);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-outreach:hover { background: var(--accent-glow); }

  .sync-status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 6px;
    vertical-align: middle;
  }
  .sync-ok { background: var(--closed); }
  .sync-pending { background: var(--contacted); }
  .sync-failed { background: var(--danger); }
</style>
</head>
<body style="display: none;" id="appBody">

<div class="header">
  <div class="header-left">
    <div class="logo">Schema<span>.</span>Technical</div>
    <div class="header-title">Pipeline Rolodex</div>
  </div>
  <div class="header-right">
    <div class="header-stat" id="stat-total">Total: <strong>0</strong></div>
    <div class="header-stat" id="stat-active">Active: <strong>0</strong></div>
  </div>
</div>

<div class="tab-bar">
  <div class="tab active" data-view="pipeline">Pipeline</div>
  <div class="tab" data-view="rolodex">Rolodex</div>
  <div class="tab" data-view="analytics">Analytics</div>
</div>

<div class="toolbar">
  <div class="search-box">
    <span class="search-icon">&#x1F50D;</span>
    <input type="text" id="searchInput" placeholder="Search companies, contacts, services...">
  </div>
  <button class="filter-btn" data-filter="all" onclick="setFilter('all')">All</button>
  <div class="divider"></div>
  <button class="filter-btn" data-filter="high" onclick="setFilter('high')">High Priority</button>
  <button class="filter-btn" data-filter="medium" onclick="setFilter('medium')">Medium</button>
  <button class="filter-btn" data-filter="low" onclick="setFilter('low')">Low</button>
  <div class="divider"></div>
  <button class="filter-btn" data-filter="SDR" onclick="setFilter('SDR')">SDR</button>
  <button class="filter-btn" data-filter="TA" onclick="setFilter('TA')">TA</button>
  <button class="filter-btn" data-filter="SNA" onclick="setFilter('SNA')">SNA</button>
  <button class="filter-btn" data-filter="FRA" onclick="setFilter('FRA')">FRA</button>
  <button class="btn-primary" onclick="openModal()">+ Add Contact</button>
</div>

<div class="pipeline-view" id="pipelineView">
  <div class="pipeline-columns" id="pipelineColumns"></div>
</div>

<div class="rolodex-view" id="rolodexView" style="display:none;">
  <div class="rolodex-grid" id="rolodexGrid"></div>
</div>

<div class="rolodex-view" id="analyticsView" style="display:none;">

<input type="file" id="importFile" accept=".json" style="display:none;">

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbygMgQtZPLS7OaUS7szQVqESPsZNTEAS24xeDutPXAZIxmsYYtv3uUaKtiPjzlHFzM9lA/exec?token=Schema_Pipeline_2026_Secure!';
const STATUSES = ['Identified','Contacted','Engaged','Qualified','Proposal Sent','Closed','Hold','Dead'];
const STATUS_COLORS = {
  'Identified':'var(--identified)','Contacted':'var(--contacted)','Engaged':'var(--engaged)',
  'Qualified':'var(--qualified)','Proposal Sent':'var(--proposal)','Closed':'var(--closed)','Hold':'var(--hold)','Dead':'var(--dead)'
};
const STATUS_CLASSES = {
  'Identified':'status-identified','Contacted':'status-contacted','Engaged':'status-engaged',
  'Qualified':'status-qualified','Proposal Sent':'status-proposal','Closed':'status-closed','Hold':'status-hold','Dead':'status-dead'
};

let contacts = [];
let editingId = null;
let currentView = 'pipeline';
let currentFilter = 'all';
let searchTerm = '';
let collapsedColumns = new Set(['Hold','Dead']); // Initializes the Dead column in a collapsed state

function toggleColumn(status) {
  if (collapsedColumns.has(status)) {
    collapsedColumns.delete(status);
  } else {
    collapsedColumns.add(status);
  }
  render();
}

function generateId() { return Date.now().toString(36) + Math.random().toString(36).substr(2,5); }

function isOverdue(dateStr) {
  if (!dateStr) return false;
  const d = new Date(dateStr);
  d.setHours(0,0,0,0);
  const today = new Date();
  today.setHours(0,0,0,0);
  return d.getTime() < today.getTime();
}

function getAge(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  d.setHours(0,0,0,0);
  const today = new Date();
  today.setHours(0,0,0,0);
  const diffTime = today.getTime() - d.getTime();
  const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
  return Math.max(0, diffDays) + 'd';
}

function appendContactLog() {
  const input = document.getElementById('fContactLogEntry');
  const textarea = document.getElementById('fContactLog');
  const entry = input.value.trim();
  if (!entry) return;
  const date = new Date().toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'numeric'});
  const newEntry = '[' + date + '] ' + entry;
  textarea.value = textarea.value ? newEntry + '\n' + textarea.value : newEntry;
  input.value = '';
}

function dragStart(e, id) {
  e.dataTransfer.setData('text/plain', id);
  setTimeout(() => e.target.style.opacity = '0.5', 0);
}

function dragEnd(e) {
  e.target.style.opacity = '1';
  document.querySelectorAll('.pipeline-col').forEach(c => c.classList.remove('drag-over'));
}

function dragEnter(e) {
  e.preventDefault();
  const col = e.target.closest('.pipeline-col');
  if (col && !col.classList.contains('collapsed')) col.classList.add('drag-over');
}

function dragLeave(e) {
  const col = e.target.closest('.pipeline-col');
  if (col) col.classList.remove('drag-over');
}

function allowDrop(e) {
  e.preventDefault();
}

async function dropTarget(e, targetCol) {
  e.preventDefault();
  const col = e.target.closest('.pipeline-col');
  if (col) col.classList.remove('drag-over');
  
  const id = e.dataTransfer.getData('text/plain');
  if (!id) return;

  const idx = contacts.findIndex(c => c.id === id);
  if (idx === -1) return;

  let changed = false;
  const contact = contacts[idx];
  const oldStatusLabel = contact.dead ? 'Dead' : (contact.hold ? 'Hold' : contact.status);

  if (targetCol === 'Dead') {
    if (!contact.dead) {
      contact.dead = true;
      contact.hold = false;
      changed = true;
    }
  } else if (targetCol === 'Hold') {
    if (!contact.hold) {
      contact.hold = true;
      contact.dead = false;
      changed = true;
    }
  } else {
    if (contact.status !== targetCol || contact.dead || contact.hold) {
      contact.status = targetCol;
      contact.dead = false;
      contact.hold = false;
      changed = true;
    }
  }

  if (changed) {
    contact.statusDate = new Date().toISOString();
    const dateStr = new Date().toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'numeric'});
    const logEntry = '[' + dateStr + '] System: Moved from ' + oldStatusLabel + ' to ' + targetCol;
    contact.contactLog = contact.contactLog ? logEntry + '\n' + contact.contactLog : logEntry;

    render();
    await saveData();
  }
}

const CACHE_KEY = 'schema_pipeline_cache';
const CACHE_DIRTY_KEY = 'schema_pipeline_dirty';

function cacheLocally() {
  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify(contacts));
  } catch(e) {}
}

function loadFromCache() {
  try {
    const cached = localStorage.getItem(CACHE_KEY);
    if (cached) return JSON.parse(cached);
  } catch(e) {}
  return null;
}

function markDirty(isDirty) {
  try {
    if (isDirty) localStorage.setItem(CACHE_DIRTY_KEY, '1');
    else localStorage.removeItem(CACHE_DIRTY_KEY);
  } catch(e) {}
}

function isDirty() {
  try { return localStorage.getItem(CACHE_DIRTY_KEY) === '1'; } catch(e) { return false; }
}

async function loadData() {
  document.getElementById('lastSaved').innerHTML = '<span class="sync-status-dot sync-pending"></span>Connecting to database...';
  try {
    const response = await fetch(API_URL);
    if (!response.ok) throw new Error('Network response was not ok');
    contacts = await response.json();
    if (!Array.isArray(contacts) || contacts.length === 0) {
       contacts = [];
    }
    cacheLocally();
    markDirty(false);
    render();
    updateLastSaved('ok');
  } catch(e) {
    const cached = loadFromCache();
    if (cached && cached.length > 0) {
      contacts = cached;
      document.getElementById('lastSaved').innerHTML = '<span class="sync-status-dot sync-pending"></span>Loaded from local cache (offline)';
    } else {
      document.getElementById('lastSaved').innerHTML = '<span class="sync-status-dot sync-failed"></span>Database connection failed';
      contacts = [];
    }
    render();
  }
}

async function saveData() {
  cacheLocally();
  document.getElementById('lastSaved').innerHTML = '<span class="sync-status-dot sync-pending"></span>Synchronising...';
  try {
    await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify(contacts),
      headers: {
        'Content-Type': 'text/plain;charset=utf-8',
      }
    });
    markDirty(false);
    updateLastSaved('ok');
  } catch(e) {
    markDirty(true);
    document.getElementById('lastSaved').innerHTML = '<span class="sync-status-dot sync-failed"></span>Sync failed. Data cached locally.';
  }
}

async function retrySyncIfDirty() {
  if (!isDirty()) return;
  const cached = loadFromCache();
  if (!cached) return;
  contacts = cached;
  try {
    await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify(contacts),
      headers: { 'Content-Type': 'text/plain;charset=utf-8' }
    });
    markDirty(false);
    updateLastSaved('ok');
  } catch(e) {}
}

function updateLastSaved(status) {
  const now = new Date();
  const dot = status === 'ok' ? 'sync-ok' : 'sync-pending';
  document.getElementById('lastSaved').innerHTML = '<span class="sync-status-dot ' + dot + '"></span>Last synchronised: ' + now.toLocaleString('en-GB');
}

function getFilteredContacts() {
  let filtered = [...contacts];
  if (currentFilter !== 'all') {
    if (['high', 'medium', 'low'].includes(currentFilter)) {
      filtered = filtered.filter(c => c.priority === currentFilter);
    } else if (['SDR', 'TA', 'SNA', 'FRA'].includes(currentFilter)) {
      filtered = filtered.filter(c => (c.services||[]).includes(currentFilter));
    }
  }
  if (searchTerm) {
    const term = searchTerm.toLowerCase();
    filtered = filtered.filter(c =>
      (c.company||'').toLowerCase().includes(term) ||
      (c.name||'').toLowerCase().includes(term) ||
      (c.role||'').toLowerCase().includes(term) ||
      (c.source||'').toLowerCase().includes(term) ||
      (c.notes||'').toLowerCase().includes(term) ||
      (c.contactLog||'').toLowerCase().includes(term) ||
      (c.services||[]).join(' ').toLowerCase().includes(term)
    );
  }
  return filtered;
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.filter === f);
  });
  render();
}

function render() {
  const filtered = getFilteredContacts();
  updateStats();

  if (currentView === 'pipeline') renderPipeline(filtered);
  else if (currentView === 'rolodex') renderRolodex(filtered);
  else if (currentView === 'analytics') renderAnalytics();
}

function updateStats() {
  const total = contacts.length;
  const active = contacts.filter(c => c.status !== 'Closed' && c.dead !== true && c.hold !== true).length;
  const dead = contacts.filter(c => c.dead === true).length;
  const hold = contacts.filter(c => c.hold === true).length;
  document.getElementById('stat-total').innerHTML = 'Total: <strong>' + total + '</strong>';
  let activeStr = 'Active: <strong>' + active + '</strong>';
  if (hold > 0) activeStr += ' &middot; Hold: <strong>' + hold + '</strong>';
  if (dead > 0) activeStr += ' &middot; Dead: <strong>' + dead + '</strong>';
  document.getElementById('stat-active').innerHTML = activeStr;
}

function renderPipeline(filtered) {
  const container = document.getElementById('pipelineColumns');
  container.innerHTML = '';

  STATUSES.forEach(status => {
    const isCollapsed = collapsedColumns.has(status);
    const colContacts = status === 'Dead'
      ? filtered.filter(c => c.dead === true)
      : status === 'Hold'
      ? filtered.filter(c => c.hold === true && c.dead !== true)
      : filtered.filter(c => c.status === status && c.dead !== true && c.hold !== true);

    const col = document.createElement('div');
    col.className = 'pipeline-col' + (isCollapsed ? ' collapsed' : '');
    
    if (!isCollapsed) {
      col.setAttribute('ondragover', 'allowDrop(event)');
      col.setAttribute('ondragenter', 'dragEnter(event)');
      col.setAttribute('ondragleave', 'dragLeave(event)');
      col.setAttribute('ondrop', 'dropTarget(event, "' + status + '")');
    }
      
    col.innerHTML = `
      <div class="pipeline-col-header" onclick="toggleColumn('${status}')" title="${isCollapsed ? 'Click to expand' : 'Click to collapse'}">
        <div class="pipeline-col-dot" style="background:${STATUS_COLORS[status]}"></div>
        <div class="pipeline-col-label">${status}</div>
        <div class="pipeline-col-count">${colContacts.length}</div>
      </div>
    `;

    if (!isCollapsed) {
      if (colContacts.length === 0) {
        const empty = document.createElement('div');
        empty.style.cssText = 'padding:20px 12px;text-align:center;font-size:11px;color:var(--text-muted);pointer-events:none;';
        empty.textContent = 'Drop here';
        col.appendChild(empty);
      } else {
        colContacts.forEach(c => {
          const card = document.createElement('div');
          card.className = 'pipeline-card priority-' + (c.priority||'low');
          card.setAttribute('draggable', 'true');
          card.setAttribute('ondragstart', 'dragStart(event, "' + c.id + '")');
          card.setAttribute('ondragend', 'dragEnd(event)');
          card.onclick = () => openModal(c.id);
          
          const deadTag = c.dead ? '<span style="font-family:var(--font-mono);font-size:10px;color:var(--dead);background:rgba(239,68,68,0.15);padding:2px 6px;border-radius:3px;margin-left:6px;">was ' + esc(c.status) + '</span>' : '';
          const holdTag = c.hold ? '<span style="font-family:var(--font-mono);font-size:10px;color:var(--hold);background:rgba(245,158,11,0.15);padding:2px 6px;border-radius:3px;margin-left:6px;">was ' + esc(c.status) + '</span>' : '';
          const overdueTag = (c.status !== 'Closed' && !c.dead && !c.hold && isOverdue(c.followUpDate)) ? '<span class="tag-overdue">OVERDUE</span>' : '';
          
          let velocityHtml = '';
          if (c.created) {
            const totalAge = getAge(c.created);
            const stageAge = getAge(c.statusDate || c.created);
            velocityHtml = `<div class="pipeline-card-velocity">Stage: ${stageAge} &middot; Total: ${totalAge}</div>`;
          }

          card.innerHTML = `
            <div class="pipeline-card-company">${esc(c.company)}${deadTag}${holdTag}${overdueTag}</div>
            ${c.name ? '<div class="pipeline-card-contact">' + esc(c.name) + (c.role ? ' &middot; ' + esc(c.role) : '') + '</div>' : ''}
            <div>${(c.services||[]).map(s => '<span class="pipeline-card-service">' + s + '</span>').join('')}</div>
            ${c.nextAction ? '<div class="pipeline-card-date">' + esc(c.nextAction) + '</div>' : ''}
            ${velocityHtml}
          `;
          col.appendChild(card);
        });
      }
    }
    container.appendChild(col);
  });
}

function renderRolodex(filtered) {
  const grid = document.getElementById('rolodexGrid');
  grid.innerHTML = '';

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state"><div class="empty-state-icon">&#9744;</div><div class="empty-state-text">No contacts match your filters</div><div class="empty-state-sub">Try adjusting your search or filter</div></div>';
    return;
  }

  filtered.sort((a,b) => (a.company||'').localeCompare(b.company||''));

  filtered.forEach(c => {
    const card = document.createElement('div');
    card.className = 'contact-card';
    card.onclick = () => openModal(c.id);
    const statusClass = c.dead ? 'status-dead' : (c.hold ? 'status-hold' : (STATUS_CLASSES[c.status] || 'status-identified'));
    const statusLabel = c.dead ? 'Dead (' + c.status + ')' : (c.hold ? 'Hold (' + c.status + ')' : c.status);
    const overdueTag = (c.status !== 'Closed' && !c.dead && !c.hold && isOverdue(c.followUpDate)) ? '<span class="tag-overdue">OVERDUE</span>' : '';
    
    card.innerHTML = `
      <div class="contact-card-top">
        <div class="contact-card-company">${esc(c.company)}${overdueTag}</div>
        <div class="contact-card-status ${statusClass}">${statusLabel}</div>
      </div>
      ${c.name ? '<div class="contact-card-name">' + esc(c.name) + '</div>' : ''}
      ${c.role ? '<div class="contact-card-role">' + esc(c.role) + '</div>' : ''}
      <div class="contact-card-details">
        ${detailRow('Source', c.source)}
        ${detailRow('Reg Stage', c.regStage)}
        ${detailRow('Priority', capitalize(c.priority))}
        ${detailRow('Velocity', c.created ? 'Stage: ' + getAge(c.statusDate || c.created) + ' / Total: ' + getAge(c.created) : '')}
        ${detailRow('Last Contact', c.lastContact ? formatDate(c.lastContact) : 'None')}
        ${detailRow('Follow Up', c.followUpDate ? formatDate(c.followUpDate) : 'None')}
        ${detailRow('Next Action', c.nextAction)}
        ${!c.hwCheck ? '<span class="contact-card-label" style="color:var(--danger);">HW CHECK</span><span class="contact-card-value" style="color:var(--danger);">FAILED</span>' : ''}
      </div>
      <div class="contact-card-services">
        ${(c.services||[]).map(s => '<span class="pipeline-card-service">' + s + '</span>').join('')}
      </div>
    `;
    grid.appendChild(card);
  });
}

function copyOutreach() {
  const name = document.getElementById('fName').value.trim();
  const company = document.getElementById('fCompany').value.trim();
  const role = document.getElementById('fRole').value.trim();
  const services = Array.from(document.getElementById('fService').selectedOptions).map(o => o.text);

  const SERVICE_HOOKS = {
    'SDR (Design Review)': 'pre-production serviceability review',
    'TA (Technical Authoring)': 'ISO 13485 service documentation',
    'SNA (Service Network)': 'third party service network architecture',
    'FRA (Failure Analysis)': 'field failure root cause analysis'
  };

  let serviceStr = '';
  if (services.length > 0) {
    const hooks = services.map(s => SERVICE_HOOKS[s] || s);
    if (hooks.length === 1) serviceStr = hooks[0];
    else serviceStr = hooks.slice(0, -1).join(', ') + ' and ' + hooks[hooks.length - 1];
  }

  let text = 'Hi' + (name ? ' ' + name.split(' ')[0] : '') + ',\n\n';
  text += 'I am a serviceability engineer working with scaling MedTech hardware companies';
  if (serviceStr) text += ', specialising in ' + serviceStr;
  text += '.\n\n';
  if (company) text += 'I have been following ' + company + '\'s progress';
  if (role) text += ' and given your role as ' + role + ', I thought it worth reaching out directly';
  text += '.\n\n';
  text += 'Would a short call be useful?\n\n';
  text += 'Dan Howes\nSchema Technical';

  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('btnOutreach');
    const orig = btn.textContent;
    btn.textContent = 'Copied';
    btn.style.borderColor = 'var(--closed)';
    btn.style.color = 'var(--closed)';
    setTimeout(() => { btn.textContent = orig; btn.style.borderColor = ''; btn.style.color = ''; }, 1500);
  }).catch(() => { alert('Clipboard access denied. Copy manually.'); });
}

function renderAnalytics() {
  const container = document.getElementById('analyticsContent');
  const active = contacts.filter(c => c.status !== 'Closed' && c.dead !== true && c.hold !== true);
  const closed = contacts.filter(c => c.status === 'Closed' && c.dead !== true && c.hold !== true);
  const dead = contacts.filter(c => c.dead === true);
  const hold = contacts.filter(c => c.hold === true && c.dead !== true);

  const PIPELINE_STATUSES = ['Identified','Contacted','Engaged','Qualified','Proposal Sent'];

  function avgDaysInStage(status) {
    const inStage = active.filter(c => c.status === status && c.statusDate);
    if (inStage.length === 0) return null;
    const now = new Date();
    const total = inStage.reduce((sum, c) => {
      const d = new Date(c.statusDate);
      return sum + Math.max(0, Math.floor((now - d) / (1000*60*60*24)));
    }, 0);
    return Math.round(total / inStage.length);
  }

  function avgDaysToClose() {
    const withDates = closed.filter(c => c.created);
    if (withDates.length === 0) return null;
    const total = withDates.reduce((sum, c) => {
      const created = new Date(c.created);
      const closedDate = c.statusDate ? new Date(c.statusDate) : new Date();
      return sum + Math.max(0, Math.floor((closedDate - created) / (1000*60*60*24)));
    }, 0);
    return Math.round(total / withDates.length);
  }

  const stageData = PIPELINE_STATUSES.map(s => ({
    status: s,
    count: active.filter(c => c.status === s).length,
    avgDays: avgDaysInStage(s)
  }));

  const maxAvg = Math.max(...stageData.map(s => s.avgDays || 0), 1);
  const closeDays = avgDaysToClose();

  const serviceBreakdown = {};
  ['SDR','TA','SNA','FRA'].forEach(svc => {
    serviceBreakdown[svc] = {
      active: active.filter(c => (c.services||[]).includes(svc)).length,
      closed: closed.filter(c => (c.services||[]).includes(svc)).length,
      hold: hold.filter(c => (c.services||[]).includes(svc)).length,
      dead: dead.filter(c => (c.services||[]).includes(svc)).length
    };
  });

  const overdueCount = active.filter(c => isOverdue(c.followUpDate)).length;

  let html = '';

  html += '<div class="analytics-section">';
  html += '<div class="analytics-section-title">Pipeline Summary</div>';
  html += '<div class="analytics-grid">';
  html += '<div class="analytics-card"><div class="analytics-card-label">Active</div><div class="analytics-card-value">' + active.length + '</div></div>';
  html += '<div class="analytics-card"><div class="analytics-card-label">Closed</div><div class="analytics-card-value">' + closed.length + '</div></div>';
  html += '<div class="analytics-card"><div class="analytics-card-label">Hold</div><div class="analytics-card-value" style="color:var(--hold);">' + hold.length + '</div></div>';
  html += '<div class="analytics-card"><div class="analytics-card-label">Dead</div><div class="analytics-card-value" style="color:var(--dead);">' + dead.length + '</div></div>';
  html += '<div class="analytics-card"><div class="analytics-card-label">Overdue</div><div class="analytics-card-value" style="color:' + (overdueCount > 0 ? 'var(--danger)' : 'var(--text-primary)') + ';">' + overdueCount + '</div></div>';
  if (closeDays !== null) {
    html += '<div class="analytics-card"><div class="analytics-card-label">Avg. Close</div><div class="analytics-card-value">' + closeDays + '<span class="analytics-card-unit">d</span></div></div>';
  }
  html += '</div></div>';

  html += '<div class="analytics-section">';
  html += '<div class="analytics-section-title">Stage Bottleneck Analysis</div>';
  stageData.forEach(s => {
    const pct = s.avgDays !== null ? Math.round((s.avgDays / maxAvg) * 100) : 0;
    const colour = STATUS_COLORS[s.status] || 'var(--accent)';
    const label = s.avgDays !== null ? s.avgDays + 'd avg (' + s.count + ' contacts)' : 'No data';
    html += '<div class="analytics-bar-row">';
    html += '<div class="analytics-bar-label">' + s.status + '</div>';
    html += '<div class="analytics-bar-track"><div class="analytics-bar-fill" style="width:' + Math.max(pct, 8) + '%;background:' + colour + ';"><span class="analytics-bar-value">' + label + '</span></div></div>';
    html += '</div>';
  });
  html += '</div>';

  html += '<div class="analytics-section">';
  html += '<div class="analytics-section-title">Service Line Breakdown</div>';
  html += '<table class="analytics-table"><thead><tr><th>Service</th><th>Active</th><th>Closed</th><th>Hold</th><th>Dead</th><th>Total</th></tr></thead><tbody>';
  ['SDR','TA','SNA','FRA'].forEach(svc => {
    const d = serviceBreakdown[svc];
    const total = d.active + d.closed + d.hold + d.dead;
    html += '<tr><td style="font-weight:600;color:var(--text-primary);">' + svc + '</td><td>' + d.active + '</td><td>' + d.closed + '</td><td>' + d.hold + '</td><td>' + d.dead + '</td><td style="font-weight:600;">' + total + '</td></tr>';
  });
  html += '</tbody></table></div>';

  container.innerHTML = html;
}

function detailRow(label, value) {
  if (!value) return '';
  return `<span class="contact-card-label">${label}</span><span class="contact-card-value">${esc(value)}</span>`;
}

function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function capitalize(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }
function formatDate(d) { try { return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}); } catch(e) { return d; } }

function openModal(id) {
  editingId = id || null;
  const modal = document.getElementById('modalOverlay');
  document.getElementById('modalTitle').textContent = id ? 'Edit Contact' : 'Add Contact';
  document.getElementById('btnDelete').style.display = id ? 'block' : 'none';
  document.getElementById('btnOutreach').style.display = id ? 'inline-block' : 'none';

  if (id) {
    const c = contacts.find(x => x.id === id);
    if (!c) return;
    document.getElementById('fCompany').value = c.company || '';
    document.getElementById('fName').value = c.name || '';
    document.getElementById('fRole').value = c.role || '';
    document.getElementById('fSource').value = c.source || '';
    document.getElementById('fStatus').value = c.status || 'Identified';
    document.getElementById('fPriority').value = c.priority || 'medium';
    document.getElementById('fRegStage').value = c.regStage || '';
    document.getElementById('fLastContact').value = c.lastContact || '';
    document.getElementById('fFollowUpDate').value = c.followUpDate || '';
    document.getElementById('fNextAction').value = c.nextAction || '';
    document.getElementById('fNotes').value = c.notes || '';
    document.getElementById('fContactLog').value = c.contactLog || '';
    document.getElementById('fHwCheck').checked = c.hwCheck !== false;
    document.getElementById('fHold').checked = c.hold === true;
    document.getElementById('fDead').checked = c.dead === true;
    const sel = document.getElementById('fService');
    Array.from(sel.options).forEach(o => { o.selected = (c.services||[]).includes(o.value); });
  } else {
    ['fCompany','fName','fRole','fSource','fRegStage','fLastContact','fFollowUpDate','fNextAction','fNotes','fContactLog','fContactLogEntry'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('fStatus').value = 'Identified';
    document.getElementById('fPriority').value = 'medium';
    document.getElementById('fHwCheck').checked = true;
    document.getElementById('fHold').checked = false;
    document.getElementById('fDead').checked = false;
    Array.from(document.getElementById('fService').options).forEach(o => o.selected = false);
  }
  modal.classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  editingId = null;
}

async function saveContact() {
  const company = document.getElementById('fCompany').value.trim();
  if (!company) { alert('Company name is required.'); return; }

  const isDuplicate = contacts.some(c => c.company.toLowerCase() === company.toLowerCase() && c.id !== editingId);
  if (isDuplicate) {
    if (!confirm('A contact for "' + company + '" already exists in the pipeline. Are you sure you want to create a duplicate entry?')) {
      return;
    }
  }

  const services = Array.from(document.getElementById('fService').selectedOptions).map(o => o.value);
  const isDeadChecked = document.getElementById('fDead').checked;
  const isHoldChecked = document.getElementById('fHold').checked;
  const newStatus = document.getElementById('fStatus').value;
  let contactLogStr = document.getElementById('fContactLog').value.trim();

  const data = {
    company,
    name: document.getElementById('fName').value.trim(),
    role: document.getElementById('fRole').value.trim(),
    source: document.getElementById('fSource').value.trim(),
    status: newStatus,
    priority: document.getElementById('fPriority').value,
    regStage: document.getElementById('fRegStage').value.trim(),
    services,
    lastContact: document.getElementById('fLastContact').value,
    followUpDate: document.getElementById('fFollowUpDate').value,
    nextAction: document.getElementById('fNextAction').value.trim(),
    notes: document.getElementById('fNotes').value.trim(),
    hwCheck: document.getElementById('fHwCheck').checked,
    hold: isHoldChecked && !isDeadChecked,
    dead: isDeadChecked,
  };

  if (editingId) {
    const idx = contacts.findIndex(c => c.id === editingId);
    if (idx >= 0) { 
      const oldContact = contacts[idx];
      const wasDead = oldContact.dead;
      const wasHold = oldContact.hold;
      const oldStatus = oldContact.status;
      
      if (wasDead === true && isDeadChecked === false) {
        const dateStr = new Date().toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'numeric'});
        const reactivationEntry = '[' + dateStr + '] [Reactivated from Dead]';
        contactLogStr = contactLogStr ? reactivationEntry + '\n' + contactLogStr : reactivationEntry;
      }

      if (wasHold === true && !isHoldChecked) {
        const dateStr = new Date().toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'numeric'});
        const reactivationEntry = '[' + dateStr + '] [Released from Hold]';
        contactLogStr = contactLogStr ? reactivationEntry + '\n' + contactLogStr : reactivationEntry;
      }

      if ((oldStatus !== newStatus && !isDeadChecked && !isHoldChecked) || (wasDead !== isDeadChecked) || (wasHold !== (isHoldChecked && !isDeadChecked))) {
        data.statusDate = new Date().toISOString();
      } else {
        data.statusDate = oldContact.statusDate;
      }

      data.contactLog = contactLogStr;
      contacts[idx] = { ...contacts[idx], ...data }; 
    }
  } else {
    data.contactLog = contactLogStr;
    data.id = generateId();
    const nowISO = new Date().toISOString();
    data.created = nowISO;
    data.statusDate = nowISO;
    contacts.push(data);
  }

  closeModal();
  render();
  await saveData();
}

async function deleteContact() {
  if (!editingId) return;
  if (!confirm('Delete this contact? This cannot be undone.')) return;
  contacts = contacts.filter(c => c.id !== editingId);
  closeModal();
  render();
  await saveData();
}

function exportCSV() {
  const headers = ['Company','Contact','Role','Source','Status','Priority','Reg Stage','Services','Last Contact','Follow Up','Next Action','Notes','Contact Log','HW Check','Hold','Dead','Created','Status Date'];
  const rows = contacts.map(c => [
    c.company, c.name, c.role, c.source, c.status, c.priority, c.regStage,
    (c.services||[]).join('; '), c.lastContact, c.followUpDate, c.nextAction, c.notes, c.contactLog, c.hwCheck ? 'Yes' : 'No', c.hold ? 'Yes' : 'No', c.dead ? 'Yes' : 'No', c.created || '', c.statusDate || ''
  ]);
  const csv = [headers, ...rows].map(r => r.map(v => '"' + (v||'').replace(/"/g,'""') + '"').join(',')).join('\n');
  download(csv, 'schema_pipeline_' + dateStamp() + '.csv', 'text/csv');
}

function exportJSON() {
  download(JSON.stringify(contacts, null, 2), 'schema_pipeline_' + dateStamp() + '.json', 'application/json');
}

function importJSON() {
  document.getElementById('importFile').click();
}

document.getElementById('importFile').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async function(ev) {
    try {
      const data = JSON.parse(ev.target.result);
      if (Array.isArray(data)) {
        if (confirm('Import ' + data.length + ' contacts? This will merge with existing data.')) {
          document.getElementById('lastSaved').textContent = 'Merging data and uploading to database...';
          const existingIds = new Set(contacts.map(c => c.id));
          data.forEach(c => {
            if (!c.statusDate) c.statusDate = c.created || new Date().toISOString();
            if (!existingIds.has(c.id)) { contacts.push(c); }
            else {
              const idx = contacts.findIndex(x => x.id === c.id);
              if (idx >= 0) contacts[idx] = c;
            }
          });
          
          render();
          
          try {
            await saveData();
            alert('Import and remote database sync complete.');
          } catch(syncErr) {
            alert('Data imported locally, but background server synchronisation failed. Please try clicking Force Sync.');
          }
        }
      }
    } catch(err) { alert('Invalid JSON file.'); }
  };
  reader.readAsText(file);
  e.target.value = '';
});

function download(content, filename, type) {
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function dateStamp() {
  const d = new Date();
  return d.getFullYear() + ('0'+(d.getMonth()+1)).slice(-2) + ('0'+d.getDate()).slice(-2);
}

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', function() {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    this.classList.add('active');
    currentView = this.dataset.view;
    document.getElementById('pipelineView').style.display = currentView === 'pipeline' ? 'block' : 'none';
    document.getElementById('rolodexView').style.display = currentView === 'rolodex' ? 'block' : 'none';
    document.getElementById('analyticsView').style.display = currentView === 'analytics' ? 'block' : 'none';
    render();
  });
});

document.getElementById('searchInput').addEventListener('input', function() {
  searchTerm = this.value;
  render();
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

document.addEventListener('DOMContentLoaded', function() {
  if (window.netlifyIdentity) {
    window.netlifyIdentity.on('init', user => {
      if (!user) {
        window.location.replace('/admin/');
      } else {
        document.getElementById('appBody').style.display = 'block';
        loadData();
        setFilter('all');
        render();
        setInterval(retrySyncIfDirty, 30000);
      }
    });
    window.netlifyIdentity.init();
  } else {
    window.location.replace('/admin/');
  }
});
</script>

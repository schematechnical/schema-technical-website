// Build quiz
const qc = document.getElementById('qc');
const answers = {};
let totalMarks = 0;
Q.forEach(q => totalMarks += q.marks);

Q.forEach((q, qi) => {
  const card = document.createElement('div');
  card.className = 'qcard';
  card.id = 'card_' + q.id;
  
  const letters = ['A','B','C','D'];
  let optsHtml = '';
  const isGrid = q.grid;
  
  q.opts.forEach((o, oi) => {
    optsHtml += `<div class="opt" data-qi="${qi}" data-oi="${oi}" onclick="selectOpt(this,${qi},${oi})">
      <div class="ol">${letters[oi]}</div>
      <div class="oc">${o}</div>
    </div>`;
  });

  card.innerHTML = `
    <div class="qn"><span class="qm">${q.marks} mark${q.marks>1?'s':''}</span>${q.qn}</div>
    <div class="qt">${q.text}</div>
    <div class="${isGrid ? 'ogrid' : 'opts'}" id="opts_${qi}">${optsHtml}</div>
    <div class="fb" id="fb_${qi}"></div>
  `;
  qc.appendChild(card);
});

function selectOpt(el, qi, oi) {
  const container = document.getElementById('opts_' + qi);
  container.querySelectorAll('.opt').forEach(o => o.classList.remove('sel'));
  el.classList.add('sel');
  answers[qi] = oi;
  updateProgress();
}

function updateProgress() {
  const answered = Object.keys(answers).length;
  const pct = (answered / Q.length) * 100;
  document.getElementById('pf').style.width = pct + '%';
}

function submitAll() {
  let score = 0;
  const results = [];

  Q.forEach((q, qi) => {
    const card = document.getElementById('card_' + q.id);
    const fb = document.getElementById('fb_' + qi);
    const container = document.getElementById('opts_' + qi);
    const opts = container.querySelectorAll('.opt');

    opts.forEach(o => { o.classList.add('dis'); o.classList.remove('sel'); });

    const chosen = answers[qi];
    const correct = q.ans;
    const isCorrect = chosen === correct;

    if (isCorrect) {
      score += q.marks;
      opts[correct].classList.add('cor');
      card.classList.add('ok');
      fb.className = 'fb sh cfb';
      fb.textContent = '✓ Correct! ' + q.explain;
    } else {
      if (chosen !== undefined) {
        opts[chosen].classList.add('wrg');
      }
      opts[correct].classList.add('cor');
      card.classList.add('nok');
      fb.className = 'fb sh wfb';
      fb.textContent = '✗ ' + q.explain;
    }

    results.push({ name: q.qn, correct: isCorrect, marks: q.marks });
  });

  document.getElementById('sbtn').disabled = true;
  document.getElementById('pf').style.width = '100%';

  // Show results panel
  const rp = document.getElementById('rp');
  const pct = Math.round((score / totalMarks) * 100);
  let breakdownHtml = '';
  results.forEach(r => {
    const cls = r.correct ? 'dg' : 'dr';
    breakdownHtml += `<div class="ri"><span class="${cls}"><span class="dot"></span>${r.name.replace('Question ','Q')}</span><span>${r.correct ? r.marks + '/' + r.marks : '0/' + r.marks}</span></div>`;
  });

  const correctCount = results.filter(r => r.correct).length;

  rp.innerHTML = `
    <div class="rscore">${score} / ${totalMarks}</div>
    <div class="rsub">${pct}% — ${correctCount} of ${Q.length} questions correct</div>
    <div class="rbd">${breakdownHtml}</div>
  `;
  rp.classList.add('sh');
  rp.scrollIntoView({ behavior: 'smooth' });
}
</script>
